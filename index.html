<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>星间手札</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

min-height:100vh;

background:#050716;

color:#f5f2ff;

font-family:"Microsoft YaHei",sans-serif;

overflow-x:hidden;

}





/* 开场 */

#intro{

position:fixed;

inset:0;

display:flex;

justify-content:center;

align-items:center;

background:#02030d;

z-index:10;

animation:introFade 5s forwards;

}



#introText{

font-size:45px;

text-align:center;

letter-spacing:8px;

line-height:1.8;

color:white;

text-shadow:
0 0 20px #b9a7ff;


animation:textShow 5s forwards;

}





@keyframes textShow{


0%{

opacity:0;

transform:scale(0.8);

}


30%{

opacity:1;

transform:scale(1);

}


70%{

opacity:1;

}


100%{

opacity:0;

transform:scale(1.5);

}


}




@keyframes introFade{


0%{

opacity:1;

}


80%{

opacity:1;

}


100%{

opacity:0;

pointer-events:none;

}


}






/* 页面隐藏 */


.hidden{

display:none;

}






/* 星空主页 */


#home{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

background:

radial-gradient(circle at top,#25204f,#050716);

}





#home::before{

content:"";

position:absolute;

inset:0;

background-image:

radial-gradient(white 1px,transparent 1px);

background-size:70px 70px;

opacity:0.4;

}





#home h1{

font-size:48px;

z-index:1;

text-shadow:

0 0 30px #a98cff;

}





button{

position:relative;

z-index:2;

border:none;

border-radius:40px;

padding:16px 40px;

font-size:20px;

color:white;

background:#8d7cff;

cursor:pointer;

box-shadow:

0 0 25px rgba(140,120,255,.8);

}





button:hover{

transform:scale(1.05);

}







.page{

min-height:100vh;

padding:30px;

background:

radial-gradient(circle at top,#29234f,#050716);

}





.book{

max-width:800px;

margin:auto;

padding:30px;

background:

rgba(255,255,255,0.12);

border-radius:30px;

backdrop-filter:blur(15px);

box-shadow:

0 0 40px rgba(150,120,255,.3);

}





.section{

margin-top:25px;

padding:20px;

border-radius:20px;

background:

rgba(255,255,255,.08);

}





input,
textarea{

width:100%;

margin:8px 0;

padding:12px;

border:none;

border-radius:12px;

background:

rgba(0,0,0,.3);

color:white;

font-size:16px;

}




textarea{

height:130px;

}





.emotion{

display:flex;

gap:10px;

}



.emotion button{

padding:10px;

width:55px;

height:55px;

font-size:25px;

background:

rgba(255,255,255,.15);

}





.exit{

margin-bottom:20px;

background:

rgba(255,255,255,.15);

}






#diaryPage{

text-align:center;

}





#history{

max-width:800px;

margin:30px auto;

}





.history-item{

padding:20px;

margin:15px;

border-radius:20px;

background:

rgba(255,255,255,.1);

text-align:left;

    }

</style>


</head>



<body>


<!-- 开场页面 -->

<div id="intro">


<div id="introText">

你与他<br>
未完待续

</div>


</div>





<!-- 星空主页 -->


<div id="home" class="hidden">


<h1>
🌌 星间手札
</h1>


<button onclick="openRecord()">

记录今日塔罗

</button>


</div>







<!-- 记录页面 -->


<div id="record" class="page hidden">


<button class="exit"
onclick="backHome()">

← 退出

</button>



<div class="book">


<h1>
🔮 今日塔罗
</h1>



<div class="section">


<h2>
🌙 今日心情
</h2>


<input id="moodText"
placeholder="今天的心情……">



<div class="emotion">


<button onclick="chooseMood('😊')">
😊
</button>


<button onclick="chooseMood('🥰')">
🥰
</button>


<button onclick="chooseMood('😢')">
😢
</button>


<button onclick="chooseMood('🌙')">
🌙
</button>


</div>


<p id="selectedMood">
</p>


</div>







<div class="section">


<h2>
🔮 塔罗牌
</h2>


<input id="pastCard"
placeholder="过去">


<input id="nowCard"
placeholder="现在">


<input id="futureCard"
placeholder="未来">


</div>







<div class="section">


<h2>
🕊 想对他说的话
</h2>


<textarea id="message"></textarea>


</div>







<div class="section">


<h2>
🔮 塔罗牌解读
</h2>


<textarea id="reading"></textarea>


</div>







<div class="section">


<h2>
📖 今日记录
</h2>


<textarea id="diary"></textarea>


</div>






<button onclick="saveDiary()">

✨ 保存记录

</button>





<button onclick="openDiary()">

📖 打开日记

</button>



</div>


</div>









<!-- 日记页面 -->


<div id="diaryPage" class="page hidden">


<button class="exit"
onclick="backHome()">

← 返回

</button>



<h1>
📖 我的星间记录
</h1>



<button onclick="toggleEdit()">

编辑

</button>



<div id="history">


</div>



</div>





<script>


let selectedMood="";

let editing=false;



// 开场结束进入主页

setTimeout(function(){

document.getElementById("intro").style.display="none";

document.getElementById("home").classList.remove("hidden");


},5000);





// 心情选择

function chooseMood(mood){

selectedMood=mood;

document.getElementById("selectedMood").innerHTML=
"今日心情："+mood;

}






// 页面切换


function openRecord(){

home.classList.add("hidden");

record.classList.remove("hidden");

}




function backHome(){

record.classList.add("hidden");

diaryPage.classList.add("hidden");

home.classList.remove("hidden");

}






// 保存记录


function saveDiary(){


let data={


id:Date.now(),


date:new Date().toLocaleDateString(),


mood:
selectedMood,


moodText:
document.getElementById("moodText").value,


past:
document.getElementById("pastCard").value,


now:
document.getElementById("nowCard").value,


future:
document.getElementById("futureCard").value,


message:
document.getElementById("message").value,


reading:
document.getElementById("reading").value,


diary:
document.getElementById("diary").value


};




let list=

JSON.parse(localStorage.getItem("starMemory"))

||

[];




list.push(data);


localStorage.setItem(

"starMemory",

JSON.stringify(list)

);



alert("✨ 记录已经保存");


}







// 打开日记


function openDiary(){


record.classList.add("hidden");


diaryPage.classList.remove("hidden");


showHistory();


}








// 显示记录


function showHistory(){



let box=document.getElementById("history");


let list=

JSON.parse(localStorage.getItem("starMemory"))

||

[];




box.innerHTML="";





list.forEach(function(item,index){



let div=document.createElement("div");


div.className="history-item";



div.innerHTML=


`

<h3>
🌙 ${item.date}
</h3>


<p>
心情：${item.mood}
</p>


<p>
过去：${item.past}
</p>


<p>
现在：${item.now}
</p>


<p>
未来：${item.future}
</p>


<p>
${item.message.substring(0,80)}
</p>



${
editing ?

`

<button onclick="moveUp(${index})">
↑ 上移
</button>

<button onclick="moveDown(${index})">
↓ 下移
</button>

<button onclick="deleteDiary(${item.id})">
删除
</button>

`

:

""

}


`;



box.appendChild(div);



});



}








// 编辑模式


function toggleEdit(){


editing=!editing;


showHistory();


}







// 删除


function deleteDiary(id){


let list=

JSON.parse(localStorage.getItem("starMemory"))

||

[];



list=list.filter(function(item){

return item.id!==id;

});



localStorage.setItem(

"starMemory",

JSON.stringify(list)

);



showHistory();


}







// 上移


function moveUp(index){


let list=

JSON.parse(localStorage.getItem("starMemory"));



if(index>0){


[list[index-1],list[index]]

=
[list[index],list[index-1]];


}


localStorage.setItem(

"starMemory",

JSON.stringify(list)

);



showHistory();

}






// 下移


function moveDown(index){


let list=

JSON.parse(localStorage.getItem("starMemory"));



if(index<list.length-1){


[list[index+1],list[index]]

=
[list[index],list[index+1]];


}



localStorage.setItem(

"starMemory",

JSON.stringify(list)

);



showHistory();


    }

</script>



</body>

</html>
