<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>星间手札</title>


<style>

*{
box-sizing:border-box;
}


html,
body{

margin:0;

width:100%;

height:100%;

overflow-x:hidden;

font-family:
"Cormorant Garamond",
"Microsoft YaHei",
serif;

color:#f8f5ff;

background:
linear-gradient(
180deg,
#090d2b,
#17143b
);

}




/* 星空层 */

#stars{

position:fixed;

inset:0;

overflow:hidden;

z-index:-1;

background:

radial-gradient(
circle at 50% 20%,
rgba(120,100,220,.35),
transparent 35%
);

}





.star{

position:absolute;

width:3px;

height:3px;

background:white;

border-radius:50%;

animation:
twinkle 3s infinite ease-in-out;

}





@keyframes twinkle{


0%,100%{

opacity:.3;

transform:scale(1);

}


50%{

opacity:1;

transform:scale(1.8);

}


}







/* 通用页面 */


.page{

min-height:100vh;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

padding:30px;

animation:
fadeIn .8s ease;

}




.hidden{

display:none!important;

}





@keyframes fadeIn{


from{

opacity:0;

transform:translateY(20px);

}


to{

opacity:1;

transform:none;

}


}







/* 开场 */


#opening{


position:fixed;

inset:0;

display:flex;

align-items:center;

justify-content:center;

background:
linear-gradient(
180deg,
#070923,
#15143b
);


z-index:20;


animation:
openingHide 5s forwards;


}




.opening-word{


font-size:28px;


letter-spacing:6px;


text-align:center;


font-family:
"Kaiti",
serif;


color:#fff;


text-shadow:


0 0 12px rgba(210,190,255,.8);


animation:
typingGlow 4s;


}



.opening-word div{

opacity:0;

animation:
wordShow 2s forwards;

}


.opening-word div:nth-child(2){

animation-delay:1.5s;

}



@keyframes wordShow{

to{

opacity:1;

}

}




@keyframes typingGlow{


50%{

text-shadow:
0 0 30px #c8b7ff;

}


}





@keyframes openingHide{


0%,85%{

opacity:1;

}


100%{

opacity:0;

visibility:hidden;

}

}









/* 首页 */


.home-title{

text-align:center;

margin-bottom:50px;

}



.home-title h1{

font-size:46px;

font-weight:400;

letter-spacing:8px;

}



.home-title p{

opacity:.75;

letter-spacing:3px;

}







/* 时间卡 */

.time-card{

position:absolute;

top:35px;

right:35px;


text-align:center;


font-size:14px;


line-height:1.8;


opacity:.8;


}





#days{

font-size:20px;

color:#ddd1ff;

}






/* 按钮 */


.home-buttons{

display:flex;

flex-direction:column;

gap:25px;

}



button{


border:none;


padding:16px 50px;


border-radius:40px;


font-size:18px;


color:white;


background:

rgba(255,255,255,.12);


border:

1px solid rgba(255,255,255,.25);



backdrop-filter:blur(15px);


box-shadow:

0 0 25px rgba(160,130,255,.35);


cursor:pointer;


transition:.3s;


}



button:hover{

transform:translateY(-3px);


box-shadow:

0 0 40px rgba(180,150,255,.7);

}





.setting-btn{

position:absolute;

top:35px;

left:35px;

width:45px;

height:45px;

padding:0;

}








/* 手札纸张 */


.paper{


width:100%;


max-width:850px;


padding:35px;


background:

rgba(255,255,255,.1);


border-radius:28px;


backdrop-filter:blur(20px);


box-shadow:

0 0 40px rgba(100,80,200,.3);


}







textarea,
input{


width:100%;


padding:14px;


margin:8px 0;


border-radius:15px;


border:none;


background:

rgba(0,0,0,.25);


color:white;


font-size:16px;


}





textarea{

min-height:130px;

}





.tarot-row{


display:flex;

gap:20px;


}



.tarot-box{


flex:1;


text-align:center;


}





@media(max-width:700px){


.tarot-row{

flex-direction:column;

}


.time-card{

top:20px;

right:20px;

}

    }

</style>


</head>



<body>


<!-- 星空背景 -->

<div id="stars"></div>



<!-- 开场 -->

<section id="opening">


<div class="opening-word">

<div>你与他</div>

<div>未完待续</div>

</div>


</section>





<!-- 首页 -->

<section id="home" class="page">


<div class="time-card">


<div>
☾
</div>


<div>
与你相遇以来
</div>


<div id="days">

第 0 天

</div>


<div id="meetDate">

相遇于 未设置

</div>


</div>





<div class="home-title">


<h1>
星间手札
</h1>


<p>
记录与你相遇的每一次星光
</p>


</div>






<div class="home-buttons">


<button onclick="openRecord()">

✨ 记录今日塔罗

</button>



<button onclick="openDiary()">

📖 打开星间日记

</button>


</div>






<button class="setting-btn"
onclick="openSetting()">

☾

</button>



</section>










<!-- 设置页面 -->

<section id="setting" class="page hidden">


<button onclick="backHome()">

← 返回

</button>


<div class="paper">


<h2>
🌙 时间设置
</h2>


<p>
与你相遇的日期
</p>


<input 
type="date"
id="meetInput">



<button onclick="saveMeetDate()">

保存

</button>



</div>


</section>










<!-- 记录页面 -->

<section id="record" class="page hidden">


<button onclick="backHome()">

← 返回星空

</button>



<div class="paper">


<h1>
🔮 今日塔罗
</h1>


<div id="today">

</div>






<h2>
今日牌阵
</h2>


<div class="tarot-row">


<div class="tarot-box">

过去

<input id="pastCard">

</div>



<div class="tarot-box">

现在

<input id="nowCard">

</div>



<div class="tarot-box">

未来

<input id="futureCard">

</div>


</div>








<h2>
🕊 想对他说的话
</h2>


<textarea id="message"></textarea>








<h2>
🔮 塔罗牌解读
</h2>


<textarea id="reading"></textarea>








<h2>
📖 今日记录
</h2>


<textarea id="diary"></textarea>






<button onclick="saveDiary()">

保存今日星光

</button>



</div>


</section>









<!-- 日记页面 -->


<section id="diary" class="page hidden">


<button onclick="backHome()">

← 返回星空

</button>




<div class="paper">


<h1>
📖 星间日记
</h1>



<button onclick="toggleEdit()">

编辑

</button>



<div id="history">


</div>



</div>


</section>









<script>

// =================
// 星空生成
// =================

const stars =
document.getElementById("stars");


for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";


star.style.left=
Math.random()*100+"%";


star.style.top=
Math.random()*100+"%";


let size=
Math.random()*3+1;


star.style.width=size+"px";

star.style.height=size+"px";


star.style.animationDelay=
Math.random()*5+"s";


stars.appendChild(star);

}







// =================
// 页面切换
// =================


function hideAll(){

document.querySelectorAll(".page")
.forEach(function(p){

p.classList.add("hidden");

});

}



function openRecord(){

hideAll();

document.getElementById("record")
.classList.remove("hidden");


document.getElementById("today")
.innerHTML=
new Date().toLocaleDateString();

}





function openDiary(){

hideAll();

document.getElementById("diary")
.classList.remove("hidden");


showHistory();

}





function openSetting(){

hideAll();

document.getElementById("setting")
.classList.remove("hidden");

}




function backHome(){

hideAll();

document.getElementById("home")
.classList.remove("hidden");

}









// =================
// 相遇日期
// =================


function saveMeetDate(){


let date=
document.getElementById("meetInput").value;


localStorage.setItem(
"meetDate",
date
);


updateDays();


alert("🌙 相遇日期已保存");


}





function updateDays(){


let date=
localStorage.getItem("meetDate");



let days=document.getElementById("days");

let text=document.getElementById("meetDate");



if(!date){

days.innerHTML="第 0 天";

text.innerHTML=
"相遇于 未设置";

return;

}



let start=
new Date(date);


let now=
new Date();



let diff=
Math.floor(
(now-start)
/(1000*60*60*24)
);



days.innerHTML=
"第 "+diff+" 天";


text.innerHTML=
"相遇于 "+date;


}





updateDays();









// =================
// 保存记录
// =================


function saveDiary(){


let record={


id:Date.now(),


date:
new Date().toLocaleDateString(),


past:
document.getElementById("pastCard").value,


now:
document.getElementById("nowCard").value,


future:
document.getElementById("futureCard").value,


message:
document.getElementById("message").value,


reading:
document.getElementById("reading").value,


diary:
document.getElementById("diary").value


};



let list=
JSON.parse(
localStorage.getItem("starDiary")
)
||[];



list.push(record);



localStorage.setItem(
"starDiary",
JSON.stringify(list)
);



alert("✨ 今日星光已保存");


}









// =================
// 日记
// =================


let editing=false;



function toggleEdit(){

editing=!editing;

showHistory();

}





function showHistory(){


let box=
document.getElementById("history");


let list=
JSON.parse(
localStorage.getItem("starDiary")
)
||[];




box.innerHTML="";



if(list.length===0){

box.innerHTML=
"还没有星间记录";

return;

}





list.forEach(function(item,index){


let div=
document.createElement("div");


div.className="paper";


div.innerHTML=

`

<h3>
🌙 ${item.date}
</h3>


<p>
过去：${item.past}
</p>


<p>
现在：${item.now}
</p>


<p>
未来：${item.future}
</p>


<p>
🕊 ${item.message}
</p>


${
editing?

`

<button onclick="deleteDiary(${item.id})">

删除

</button>

`

:""

}


`;


</script>


</body>

</html>
