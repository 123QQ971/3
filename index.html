<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>星间手札</title>


<style>

*{
box-sizing:border-box;
}


html,body{

margin:0;

width:100%;

height:100%;

overflow-x:hidden;


font-family:
"Kaiti",
"STKaiti",
"Microsoft YaHei",
serif;


color:#f7f3ff;


background:

linear-gradient(
180deg,
#070b24 0%,
#10153b 50%,
#18153d 100%
);


}








/* 星空 */


#stars{

position:fixed;

inset:0;

overflow:hidden;

z-index:-1;


}




.star{


position:absolute;


border-radius:50%;


background:#fff;


animation:
starLight 4s infinite ease-in-out;


}




@keyframes starLight{


0%,100%{

opacity:.25;

transform:scale(1);

}


50%{

opacity:1;

transform:scale(1.5);


}


}








/* 开场 */


#opening{


position:fixed;


inset:0;


z-index:20;


display:flex;


justify-content:center;


align-items:center;



background:

radial-gradient(
circle,
#2b285f,
#070b24
);



transition:opacity .8s;


}





.vertical-love{


font-size:32px;


line-height:1.7;


letter-spacing:10px;



text-shadow:


0 0 20px rgba(220,205,255,.9);


animation:

fadeText 2.5s;


}




.unfinished{


margin-top:60px;


font-size:25px;


letter-spacing:14px;


opacity:0;


text-shadow:

0 0 20px rgba(220,205,255,.9);



animation:

showEnd 2s forwards;


animation-delay:2s;



}




@keyframes fadeText{


from{

opacity:0;

}

to{

opacity:1;

}


}




@keyframes showEnd{


to{

opacity:1;

}

}









/* 页面 */


.page{


height:100vh;


display:flex;


justify-content:center;


align-items:center;



padding:25px;



animation:

pageIn .8s;


}




.hidden{

display:none!important;

}





@keyframes pageIn{


from{

opacity:0;

transform:translateY(15px);

}


to{

opacity:1;

}


}








/* 首页 */


.home-wrap{


width:100%;


max-width:500px;


text-align:center;


}



.title{


margin-bottom:35px;


}



.title h1{


font-size:42px;


font-weight:normal;


letter-spacing:12px;


text-shadow:

0 0 25px rgba(220,210,255,.7);



}




.title p{


font-size:15px;


letter-spacing:4px;


opacity:.75;


}










/* 万年历 */


.calendar-card{


margin:0 auto 40px;


width:260px;


padding:35px 20px;



border-radius:30px;



background:

rgba(255,255,255,.09);



border:

1px solid rgba(255,255,255,.18);



backdrop-filter:

blur(20px);



box-shadow:


0 0 40px rgba(160,140,255,.35);



}



.day-number{


font-size:38px;


letter-spacing:3px;



}




.day-text{


font-size:18px;


margin-top:10px;


}




.meet-date{


margin-top:18px;


font-size:14px;


opacity:.75;


}









/* 首页按钮 */


.home-buttons{


display:flex;


flex-direction:column;


gap:20px;


align-items:center;


}



button{


width:240px;


padding:13px;


border-radius:40px;


border:


1px solid rgba(255,255,255,.25);


background:


rgba(255,255,255,.1);


color:white;


font-size:16px;


letter-spacing:2px;



backdrop-filter:

blur(15px);



box-shadow:


0 0 25px rgba(170,150,255,.3);



cursor:pointer;



transition:.3s;



}




button:hover{


transform:translateY(-3px);


}




.small-btn{


width:45px;


height:45px;


padding:0;


font-size:20px;


}








/* 返回 */


.exit{


position:fixed;


top:20px;


right:20px;


width:38px;


height:38px;


padding:0;


border-radius:50%;


z-index:50;


}









/* 手札页面 */


.paper{


width:min(850px,95%);


max-height:90vh;


overflow:auto;



padding:35px;



border-radius:30px;



background:


rgba(255,255,255,.08);



border:

1px solid rgba(255,255,255,.15);



backdrop-filter:

blur(25px);



box-shadow:


0 0 45px rgba(140,120,230,.3);



}



.paper h1{


text-align:center;


font-weight:normal;


letter-spacing:5px;


}








.cards{


display:flex;


gap:20px;


margin:25px 0;


}




.cards div{


flex:1;


text-align:center;


}








input,
textarea{


width:100%;


padding:13px;


margin:8px 0;


border:none;


border-radius:15px;


background:

rgba(0,0,0,.2);



color:white;


font-size:15px;


}



textarea{

height:120px;

}





.edit{

margin:30px auto 0;

display:block;

}




@media(max-width:700px){


.cards{

flex-direction:column;

}


    }


</style>


</head>



<body>


<!-- 星空 -->

<div id="stars"></div>




<!-- 开场 -->

<div id="opening"
onclick="skipOpening()">



<div class="opening-content">


<div class="vertical-love">

你<br>
与<br>
他

</div>



<div class="unfinished">

未完待续

</div>



</div>


</div>









<!-- 首页 -->


<div id="home"
class="page">



<div class="home-wrap">



<div class="title">


<h1>

星间手札

</h1>


<p>

记录与你相遇的每一次星光

</p>


</div>







<!-- 万年历 -->


<div class="calendar-card">



<div class="day-number"
id="days">


第 0 天

</div>



<div class="day-text">

与你相遇

</div>



<div class="meet-date"
id="meetShow">

未设置相遇日期

</div>




</div>









<div class="home-buttons">


<button onclick="openRecord()">

✨ 记录今日塔罗

</button>



<button onclick="openDiary()">

📖 打开星间日记

</button>



<button onclick="openSetting()"
class="small-btn">

⚙

</button>



</div>




</div>


</div>









<!-- 设置 -->


<div id="setting"
class="page hidden">


<button class="exit"
onclick="backHome()">

×

</button>




<div class="paper">


<h2>

相遇日期

</h2>



<input
type="date"
id="meetInput">



<button onclick="saveMeet()">

保存

</button>



</div>


</div>









<!-- 塔罗记录 -->


<div id="record"
class="page hidden">



<button class="exit"
onclick="backHome()">

×

</button>





<div class="paper">



<h1>

🔮 今日塔罗

</h1>



<label>

标题

</label>


<input
id="recordTitle">






<label>

时间

</label>


<input
id="recordTime">








<div class="cards">



<div>

过去

<input id="past">

</div>



<div>

现在

<input id="present">

</div>



<div>

未来

<input id="future">

</div>



</div>








<h3>

🖼 塔罗牌图片

</h3>


<input
type="file"
accept="image/*">








<h3>

🕊 我想对他说的话

</h3>


<textarea id="message"></textarea>







<h3>

🔮 塔罗牌解读

</h3>


<textarea id="reading"></textarea>







<h3>

💌 他的回答

</h3>


<textarea id="reply"></textarea>







<button onclick="saveRecord()">

保存

</button>




</div>



</div>









<!-- 日记 -->


<div id="diary"
class="page hidden">



<button class="exit"
onclick="backHome()">

×

</button>



<div class="paper">



<h1>

📖 星间日记

</h1>




<div id="history">


</div>




<button onclick="editDiary()"
class="edit">

编辑

</button>



</div>


</div>







<script>

// ======================
// 星空生成
// ======================


const starsBox =
document.getElementById("stars");


for(let i=0;i<180;i++){


let s=document.createElement("div");


s.className="star";


let size=
Math.random()*3+1;


s.style.width=size+"px";

s.style.height=size+"px";


s.style.left=
Math.random()*100+"%";


s.style.top=
Math.random()*100+"%";


s.style.animationDelay=
Math.random()*5+"s";


starsBox.appendChild(s);


}









// ======================
// 开场跳过
// ======================


let opened=false;



function skipOpening(){


if(opened)return;


opened=true;



let opening=
document.getElementById("opening");


opening.style.opacity="0";



setTimeout(()=>{


opening.style.display="none";


},800);


}





setTimeout(()=>{


skipOpening();


},5000);









// ======================
// 页面切换
// ======================


function hideAll(){


document
.querySelectorAll(".page")
.forEach(p=>{


p.classList.add("hidden");


});


}





function openRecord(){


hideAll();


document
.getElementById("record")
.classList.remove("hidden");


}





function openDiary(){


hideAll();


document
.getElementById("diary")
.classList.remove("hidden");



loadHistory();


}





function openSetting(){


hideAll();


document
.getElementById("setting")
.classList.remove("hidden");


}




function backHome(){


hideAll();


document
.getElementById("home")
.classList.remove("hidden");


}









// ======================
// 相遇日期
// ======================


function saveMeet(){


let date=
document
.getElementById("meetInput")
.value;



localStorage.setItem(
"meetDate",
date
);



updateMeet();



alert("🌙 相遇日期已保存");


}





function updateMeet(){


let date=
localStorage.getItem("meetDate");



let dayBox=
document.getElementById("days");


let show=
document.getElementById("meetShow");




if(!date){


dayBox.innerHTML=
"第 0 天";


show.innerHTML=
"未设置相遇日期";


return;


}



let start=
new Date(date);



let now=
new Date();



let days=
Math.floor(
(now-start)
/
(1000*60*60*24)
);



dayBox.innerHTML=
"第 "+days+" 天";



show.innerHTML=
date;



}





updateMeet();









// ======================
// 保存塔罗记录
// ======================


function saveRecord(){



let item={


id:Date.now(),



title:
document
.getElementById("recordTitle")
.value,



time:
document
.getElementById("recordTime")
.value,



past:
document
.getElementById("past")
.value,



present:
document
.getElementById("present")
.value,



future:
document
.getElementById("future")
.value,



message:
document
.getElementById("message")
.value,



reading:
document
.getElementById("reading")
.value,



reply:
document
.getElementById("reply")
.value



};




let list=

JSON.parse(
localStorage.getItem("records")
)
||[];



list.push(item);



localStorage.setItem(
"records",
JSON.stringify(list)
);



alert("✨ 记录保存成功");


}









// ======================
// 历史目录
// ======================


function loadHistory(){



let box=
document
.getElementById("history");



let list=

JSON.parse(
localStorage.getItem("records")
)
||[];



box.innerHTML="";



if(list.length===0){


box.innerHTML=
"暂无星间记录";


return;


}




list.reverse()
.forEach(item=>{


let div=
document.createElement("div");



div.style.padding="15px";

div.style.borderBottom=
"1px solid rgba(255,255,255,.15)";



div.innerHTML=

`

<div>

🌙 ${item.title || "无标题"}

</div>

<small>

${item.time || "无时间"}

</small>

`;



box.appendChild(div);


});



}








function editDiary(){


alert(
"编辑模式将在下一步加入"
);


    }


</script>


</body>

</html>
