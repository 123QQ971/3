<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>星间手札</title>


<style>

*{
box-sizing:border-box;
}


html,body{

margin:0;

width:100%;

height:100%;

overflow-x:hidden;

font-family:
"Kaiti",
"Microsoft YaHei",
serif;

color:#f8f5ff;

background:

linear-gradient(
180deg,
#070b27,
#171441
);

}





/* 星空 */


#stars{

position:fixed;

inset:0;

z-index:-1;

overflow:hidden;

}



.star{

position:absolute;

border-radius:50%;

background:white;

animation:
twinkle 3s infinite ease-in-out;

}





@keyframes twinkle{

0%,100%{

opacity:.25;

}

50%{

opacity:1;

}

}









/* 开场 */


#opening{

position:fixed;

inset:0;

z-index:20;


display:flex;

justify-content:center;

align-items:center;


background:

radial-gradient(
circle at center,
#29245c,
#070b27
);


transition:.8s;

}




.opening-box{

text-align:center;

}



.you{

font-size:30px;

line-height:1.7;

letter-spacing:8px;


text-shadow:

0 0 18px #d8c8ff;


animation:

showText 2.5s forwards;

}





.continue{


margin-top:55px;


font-size:24px;


letter-spacing:12px;


opacity:0;


text-shadow:

0 0 18px #d8c8ff;


animation:

showContinue 2s forwards;


animation-delay:2s;


}





@keyframes showText{


from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

}

}



@keyframes showContinue{


from{

opacity:0;

}

to{

opacity:1;

}

}










/* 页面 */


.page{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;


animation:

fade .5s;


}




.hidden{

display:none!important;

}





@keyframes fade{

from{

opacity:0;

transform:translateY(15px);

}


to{

opacity:1;

}


}









/* 首页 */


.home-title{

text-align:center;

}



.home-title h1{

font-size:44px;

font-weight:normal;

letter-spacing:8px;

text-shadow:

0 0 25px #bca7ff;

}



.home-title p{

letter-spacing:3px;

opacity:.75;

}





.home-buttons{


display:flex;

flex-direction:column;


gap:30px;


margin-top:50px;


}









/* 按钮 */


button{


border:none;


color:white;


background:

rgba(255,255,255,.12);


border:

1px solid rgba(255,255,255,.25);


border-radius:40px;


padding:14px 35px;


font-size:17px;


backdrop-filter:blur(15px);


box-shadow:

0 0 25px rgba(170,140,255,.35);


cursor:pointer;


transition:.3s;


}





button:hover{


transform:scale(1.05);


}





/* 返回 */


.exit{


position:fixed;


top:20px;


right:20px;


width:38px;


height:38px;


padding:0;


margin:0;


font-size:22px;


z-index:50;


border-radius:50%;


}









/* 手札 */


.paper{


width:min(850px,95%);


max-height:90vh;


overflow:auto;


padding:35px;


border-radius:30px;


background:

rgba(255,255,255,.1);


backdrop-filter:

blur(20px);


box-shadow:

0 0 40px rgba(150,120,255,.35);


}





.paper h1{


text-align:center;


font-weight:normal;


letter-spacing:5px;


}







#date{


text-align:center;

opacity:.7;

margin-bottom:25px;

}








/* 塔罗牌 */


.cards{


display:flex;

gap:20px;

}



.card{


flex:1;

text-align:center;


}





.card-img{


height:120px;


border-radius:20px;


display:flex;


justify-content:center;


align-items:center;


font-size:45px;


background:

rgba(255,255,255,.08);


box-shadow:

inset 0 0 20px rgba(255,255,255,.1);


}





input,
textarea{


width:100%;


padding:12px;


margin:8px 0;


border:none;


border-radius:15px;


background:

rgba(0,0,0,.25);


color:white;


font-size:16px;


}





textarea{

height:120px;

}





@media(max-width:700px){


.cards{

flex-direction:column;

}


    }

</style>


</head>


<body>


<!-- 星空背景 -->

<div id="stars"></div>





<!-- 开场 -->


<div id="opening"
onclick="skipOpening()">



<div class="opening-box">


<div class="you">

你<br>
与<br>
他

</div>



<div class="continue">

未完待续

</div>



</div>


</div>









<!-- 首页 -->


<div id="home"
class="page">



<div class="home-title">


<h1>
🌙 星间手札
</h1>


<p>
记录与你相遇的每一次星光
</p>


</div>





<div class="home-buttons">


<button onclick="openRecord()">

✨ 记录今日塔罗

</button>



<button onclick="openDiary()">

📖 打开星间日记

</button>



</div>



</div>









<!-- 记录页面 -->


<div id="record"
class="page hidden">



<button class="exit"
onclick="backHome()">

×


</button>






<div class="paper">



<h1>
🔮 今日塔罗
</h1>



<div id="date">

</div>








<h2>
今日牌阵
</h2>



<div class="cards">



<div class="card">

<div class="card-img">
🔮
</div>


<p>
过去
</p>


<input id="past"
placeholder="塔罗牌名称">


</div>







<div class="card">

<div class="card-img">
🔮
</div>


<p>
现在
</p>


<input id="present"
placeholder="塔罗牌名称">


</div>







<div class="card">

<div class="card-img">
🔮
</div>


<p>
未来
</p>


<input id="future"
placeholder="塔罗牌名称">


</div>



</div>








<h2>
🖼 塔罗牌图片
</h2>


<input type="file"
id="imageUpload"
accept="image/*">








<h2>
🕊 我想对他说的话
</h2>


<textarea id="message"></textarea>









<h2>
🔮 塔罗牌解读
</h2>


<textarea id="reading"></textarea>









<h2>
💌 他的回答
</h2>


<textarea id="reply"></textarea>








<button onclick="saveRecord()">

保存今日星光

</button>





</div>


</div>









<!-- 日记页面 -->


<div id="diary"
class="page hidden">



<button class="exit"
onclick="backHome()">

×

</button>






<div class="paper">



<h1>
📖 星间日记
</h1>





<button onclick="editDiary()">

编辑

</button>





<div id="history">


</div>





</div>


</div>









<script>

// =====================
// 星空生成
// =====================


const stars =
document.getElementById("stars");


for(let i=0;i<160;i++){

let star=document.createElement("div");

star.className="star";


let size=
Math.random()*3+1;


star.style.width=size+"px";

star.style.height=size+"px";


star.style.left=
Math.random()*100+"%";


star.style.top=
Math.random()*100+"%";


star.style.animationDelay=
Math.random()*5+"s";


stars.appendChild(star);


}






// =====================
// 开场
// =====================


let openingFinished=false;



function skipOpening(){


if(openingFinished)
return;


openingFinished=true;


document.getElementById("opening")
.style.opacity="0";



setTimeout(()=>{


document.getElementById("opening")
.style.display="none";


},800);


}





setTimeout(()=>{


skipOpening();


},5000);










// =====================
// 页面切换
// =====================


function hidePages(){


document.querySelectorAll(".page")
.forEach(page=>{


page.classList.add("hidden");


});


}





function openRecord(){


hidePages();


document
.getElementById("record")
.classList.remove("hidden");


document.getElementById("date")
.innerHTML=
new Date()
.toLocaleDateString(
"zh-CN",
{
year:"numeric",
month:"long",
day:"numeric"
}
);


}





function openDiary(){


hidePages();


document
.getElementById("diary")
.classList.remove("hidden");


loadHistory();


}





function backHome(){


hidePages();


document
.getElementById("home")
.classList.remove("hidden");


}









// =====================
// 保存
// =====================


function saveRecord(){


let data={


time:
new Date()
.toLocaleDateString(
"zh-CN"
),


past:
document.getElementById("past").value,


present:
document.getElementById("present").value,


future:
document.getElementById("future").value,


message:
document.getElementById("message").value,


reading:
document.getElementById("reading").value,


reply:
document.getElementById("reply").value


};




let list=

JSON.parse(
localStorage.getItem("starMemory")
)
||[];




list.push(data);



localStorage.setItem(
"starMemory",
JSON.stringify(list)
);



alert("🌙 今日星光已保存");


}









// =====================
// 日记
// =====================


function loadHistory(){


let box=
document.getElementById("history");



let list=

JSON.parse(
localStorage.getItem("starMemory")
)
||[];




box.innerHTML="";




if(list.length===0){


box.innerHTML=
"还没有记录";


return;


}





list.reverse()
.forEach((item,index)=>{



let div=
document.createElement("div");


div.className="paper";



div.innerHTML=

`

<h3>
🌙 ${item.time}
</h3>


<p>
🔮 过去：${item.past}
</p>


<p>
🔮 现在：${item.present}
</p>


<p>
🔮 未来：${item.future}
</p>


<p>
🕊 我想说：
${item.message}
</p>


<p>
🔮 解读：
${item.reading}
</p>


<p>
💌 他的回答：
${item.reply}
</p>

`;



box.appendChild(div);


});


}






function editDiary(){

alert(
"编辑功能下一步加入"
);


    }

</script>



</body>


</html>
