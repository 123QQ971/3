<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>星间手札</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

width:100%;

min-height:100vh;

overflow:hidden;

font-family:
"Kaiti",
"Microsoft YaHei",
serif;

color:white;


background:

linear-gradient(

180deg,

#070b28,

#171445

);

}





/* 星空 */

#sky{

position:fixed;

inset:0;

z-index:-1;

overflow:hidden;

}





.star{

position:absolute;

border-radius:50%;

background:white;

animation:
shine 3s infinite;

}





@keyframes shine{


0%,100%{

opacity:.3;

}


50%{

opacity:1;

}

}








/* 开场 */


#opening{

position:fixed;

inset:0;

display:flex;

justify-content:center;

align-items:center;

background:

radial-gradient(

circle,

#25205a,

#070b28

);


z-index:10;


animation:

openingEnd 6s forwards;


}





.opening-title{

text-align:center;

}




.vertical-text{


font-size:34px;


line-height:1.5;


letter-spacing:8px;


text-shadow:

0 0 15px #c8b7ff;


}





.vertical-text div{


opacity:0;


animation:

typeIn 0.8s forwards;


}



.vertical-text div:nth-child(1){

animation-delay:.5s;

}


.vertical-text div:nth-child(2){

animation-delay:1.3s;

}


.vertical-text div:nth-child(3){

animation-delay:2.1s;

}






.continue-text{


margin-top:45px;


font-size:28px;


letter-spacing:10px;


opacity:0;


text-shadow:

0 0 20px #d9c8ff;


animation:

typeIn 1s forwards;


animation-delay:3.5s;


}





@keyframes typeIn{


from{

opacity:0;

transform:translateY(10px);

}


to{

opacity:1;

transform:none;

}

}





@keyframes openingEnd{


0%,85%{

opacity:1;

}


100%{

opacity:0;

visibility:hidden;

}

}







/* 页面 */


.screen{


min-height:100vh;


display:flex;


justify-content:center;


align-items:center;


padding:30px;


animation:

fade .6s;


}




.hidden{

display:none;

}




@keyframes fade{


from{

opacity:0;

}


to{

opacity:1;

}

}






/* 首页 */


.home-content{


text-align:center;


}




.home-content h1{


font-size:46px;


font-weight:normal;


letter-spacing:8px;


text-shadow:

0 0 25px #bba6ff;


}



.home-content p{


opacity:.8;


letter-spacing:3px;


}





button{


margin-top:25px;


display:block;


width:280px;


padding:16px;


border-radius:40px;


border:

1px solid rgba(255,255,255,.3);


background:

rgba(255,255,255,.12);


color:white;


font-size:18px;


backdrop-filter:

blur(15px);


box-shadow:

0 0 25px rgba(180,150,255,.35);


cursor:pointer;


transition:.3s;


}




button:hover{


transform:scale(1.05);


box-shadow:

0 0 40px rgba(200,170,255,.7);


}







/* 手札 */


.paper{


width:min(850px,95%);


padding:35px;


border-radius:30px;


background:

rgba(255,255,255,.1);


backdrop-filter:

blur(20px);


box-shadow:

0 0 40px rgba(130,110,220,.35);


}



input,
textarea{


width:100%;


margin:10px 0;


padding:14px;


border:none;


border-radius:15px;


background:

rgba(0,0,0,.25);


color:white;


font-size:16px;


}



textarea{


height:130px;


}





.tarot{


display:flex;


gap:20px;


}



.tarot div{


flex:1;


text-align:center;


}




.back{


position:absolute;


top:25px;


left:25px;


width:auto;


}



@media(max-width:700px){


.tarot{

flex-direction:column;

}


.home-content h1{

font-size:36px;

}

    }


</style>


</head>


<body>


<!-- 星空 -->

<div id="sky"></div>



<!-- 开场 -->

<div id="opening">


<div class="opening-title">


<div class="vertical-text">

<div>你</div>

<div>与</div>

<div>他</div>

</div>



<div class="continue-text">

未完待续

</div>



</div>


</div>







<!-- 首页 -->


<div id="home" class="screen">


<div class="home-content">


<h1>
🌙 星间手札
</h1>


<p>
记录与你相遇的每一次星光
</p>



<button onclick="showRecord()">

✨ 记录今日塔罗

</button>



<button onclick="showDiary()">

📖 打开星间日记

</button>


</div>



</div>








<!-- 记录页面 -->


<div id="record" class="screen hidden">


<button class="back"
onclick="backHome()">

← 返回

</button>



<div class="paper">


<h1>
🔮 今日塔罗
</h1>



<p id="today"></p>



<div class="tarot">


<div>

过去

<input id="past">


</div>



<div>

现在

<input id="now">


</div>




<div>

未来

<input id="future">


</div>


</div>







<h2>
🕊 想对他说的话
</h2>


<textarea id="message"></textarea>





<h2>
🔮 塔罗牌解读
</h2>


<textarea id="reading"></textarea>





<h2>
📖 今日记录
</h2>


<textarea id="diary"></textarea>




<button onclick="save()">

保存今日记录

</button>


</div>


</div>








<!-- 日记页面 -->


<div id="diaryPage" class="screen hidden">


<button class="back"
onclick="backHome()">

← 返回

</button>



<div class="paper">


<h1>
📖 星间日记
</h1>



<button onclick="editMode()">

编辑

</button>



<div id="history">

暂无记录

</div>



</div>


</div>







<script>

// =================
// 生成星空
// =================


const sky =
document.getElementById("sky");



for(let i=0;i<150;i++){


let star =
document.createElement("div");


star.className="star";



let size =
Math.random()*3+1;



star.style.width=size+"px";

star.style.height=size+"px";



star.style.left=
Math.random()*100+"%";


star.style.top=
Math.random()*100+"%";



star.style.animationDelay=
Math.random()*4+"s";



sky.appendChild(star);


}









// =================
// 开场结束
// =================


setTimeout(function(){


document.getElementById("opening")
.style.display="none";


},6000);









// =================
// 页面切换
// =================


function hideAll(){


document
.querySelectorAll(".screen")
.forEach(function(page){


page.classList.add("hidden");


});


}





function showRecord(){


hideAll();



document
.getElementById("record")
.classList.remove("hidden");



document.getElementById("today")
.innerHTML=

new Date().toLocaleDateString();


}







function showDiary(){


hideAll();



document
.getElementById("diaryPage")
.classList.remove("hidden");



loadDiary();


}





function backHome(){


hideAll();



document
.getElementById("home")
.classList.remove("hidden");


}









// =================
// 保存记录
// =================


function save(){


let item={


time:

new Date().toLocaleString(),


past:

document.getElementById("past").value,


now:

document.getElementById("now").value,


future:

document.getElementById("future").value,


message:

document.getElementById("message").value,


reading:

document.getElementById("reading").value,


diary:

document.getElementById("diary").value


};





let list =

JSON.parse(

localStorage.getItem("starNotes")

)

||[];




list.push(item);



localStorage.setItem(

"starNotes",

JSON.stringify(list)

);



alert("🌙 今日星光已保存");


}









// =================
// 日记
// =================


function loadDiary(){



let box =

document.getElementById("history");



let list =

JSON.parse(

localStorage.getItem("starNotes")

)

||[];





if(list.length===0){


box.innerHTML=

"还没有星间记录";


return;


}





box.innerHTML="";





list.reverse().forEach(function(item){



let div=

document.createElement("div");


div.style.margin="25px 0";



div.innerHTML=


`

<h3>
🌙 ${item.time}
</h3>


<p>
过去：${item.past}
</p>


<p>
现在：${item.now}
</p>


<p>
未来：${item.future}
</p>


<p>
🕊 ${item.message}
</p>


<p>
🔮 ${item.reading}
</p>


`;



box.appendChild(div);



});



    }


</script>


</body>

</html>
